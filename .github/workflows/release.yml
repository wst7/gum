name: Release

on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
        
      # Set Nodejs
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Build package
      - name: Build package
        run: bun run build

      # Build standalone binaries
      - name: Build binaries
        run: |
          bun install --os '*' --cpu '*'
          bun run build:all

      # Publish package to npm using OIDC Trusted Publishing
      - name: Publish to npm
        run: npm publish --access public

      # Upload standalone binaries to GitHub Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*