name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Install dependencies
      - name: Install dependencies
        run: bun install

      # Build JS package
      - name: Build package
        run: bun run build

      - name: Build binaries
        run: |
          bun install --os '*' --cpu '*'
          bun run build:all

      # Publish npm
      - name: Publish npm
        run: npm publish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Upload binaries to GitHub Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*